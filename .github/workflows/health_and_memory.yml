name: Lyra Health Check

on:
  schedule:
    - cron: '0 8 * * *'   # Daily at 8am UTC
  workflow_dispatch:

jobs:
  health_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.LYRA_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create directories
        run: |
          mkdir -p data memory/short_term memory/mid_term memory/long_term memory/evergreen
          mkdir -p execution/publish_logs

      - name: Run Health Check
        run: python src/health_check.py

      - name: Commit health report
        run: |
          git config user.name  "Lyra-Bot"
          git config user.email "lyra@noreply.github.com"
          git add data/health_report.json || true
          git diff --cached --quiet || git commit -m "health: $(date -u +%Y-%m-%d)"
          git push || true

  memory_compression:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: health_check
    if: github.event.schedule == '0 8 * * 0' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.LYRA_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create directories
        run: mkdir -p memory/short_term memory/mid_term memory/long_term memory/evergreen

      - name: Run Memory Manager
        run: python -c "
import sys, os
sys.path.insert(0, os.getcwd())
from src.memory_manager import MemoryManager
mm = MemoryManager(os.getcwd())
mm.process_tier_promotions()
print('Memory compression complete')
"

      - name: Commit memory updates
        run: |
          git config user.name  "Lyra-Bot"
          git config user.email "lyra@noreply.github.com"
          git add memory/ || true
          git diff --cached --quiet || git commit -m "memory: tier promotions [$(date -u +%Y-%m-%d)]"
          git push || true
