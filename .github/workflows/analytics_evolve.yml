name: Lyra Analytics & Evolution

on:
  schedule:
    - cron: '0 2 */2 * *'   # Every 48 hours at 2am UTC
  workflow_dispatch:

jobs:
  analytics_evolution:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.LYRA_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -q requests google-api-python-client google-auth google-generativeai numpy

      - name: Create directories
        run: |
          mkdir -p data memory/short_term memory/mid_term memory/long_term memory/evergreen
          mkdir -p reflection/postmortems reflection/learnings
          mkdir -p analytics/raw_exports analytics/normalized analytics/retention

      - name: Run Analytics + Evolution
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY:  ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          YT_OAUTH_TOKEN_0: ${{ secrets.YT_OAUTH_TOKEN_0 }}
        run: python src/orchestrator.py --phase=evolve

      - name: Commit evolved genome
        run: |
          git config user.name  "Lyra-Bot"
          git config user.email "lyra@noreply.github.com"
          git add -A || true
          git diff --cached --quiet || git commit -m "evolve: gen-$(cat data/.gen_counter) analytics+selection"
          git pull --rebase origin main || true
          git push || true
