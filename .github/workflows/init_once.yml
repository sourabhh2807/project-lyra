name: Initialize Database

on:
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.LYRA_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python init_db.py
      - run: |
          git config user.name "Lyra-Bot"
          git config user.email "lyra@noreply.github.com"
          git add data/genome.db data/.gen_counter memory/memory_index.json || true
          git commit -m "init: database created by GitHub Actions" || true
          git push
