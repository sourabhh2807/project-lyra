name: Lyra Research Continuous

on:
  schedule:
    - cron: '0 */3 * * *'   # Every 3 hours (saves Actions minutes vs hourly)
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.LYRA_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -q requests pytrends google-generativeai

      - name: Create directories
        run: |
          mkdir -p research/raw/trends research/raw/competitors research/raw/comments
          mkdir -p research/processed/topic_candidates research/processed/audience_maps research/processed/saturation_maps

      - name: Run Research Agent
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python src/orchestrator.py --phase=research

      - name: Commit research data
        run: |
          git config user.name  "Lyra-Bot"
          git config user.email "lyra@noreply.github.com"
          git add research/ data/ || true
          git diff --cached --quiet || git commit -m "research: topics updated [$(date -u +%Y-%m-%d %H:%M)]"
          git push || true
